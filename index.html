<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Payment</title>

<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const amount = params.get("amount") || "0";

    const upiLink =
        `upi://pay?pa=s7370133596633111@slc&pn=MS%20WORDSHOP&am=${amount}&cu=INR`;

    window.location.href = upiLink;

    document.getElementById("paylink").href = upiLink;
};
</script>

</head>
<body>

<h2>Opening UPI App...</h2>

<p>If app does not open, tap below:</p>

<a id="paylink" href="#">
    Open Payment App
</a>

</body>
</html>
